runtime:
  mode: "test"  #test或hik

# UI 窗口开关
# enable_display_window: 是否显示主画面窗口（原图/掩膜/状态）
# enable_tuning_window: 是否显示实时调参窗口
ui:
  enable_display_window: true
  enable_tuning_window: true

# source: video 或 image
# auto_start: true 时程序启动后自动加载测试文件
test:
  source: "video"
  path: ""
  auto_start: false

# 相机参数
camera:
  exposure: 10000.0
  gain: 5.9

# CAN 通信参数
# driver: socketcan 或 dameow
# interface: SocketCAN 接口名，如 can0；仅对 socketcan 生效
# selector: dameow 设备选择器，可填设备索引/SN/别名
# tx_id: 发送到下位机的 CAN ID
# bus_mode: can 或 canfd；当前 33 字节 payload 想保持不变时，应使用 canfd
# bitrate/data_bitrate: 对 dameow 会传给 drv_ws；对 socketcan 仅作为记录
# channel/device_type: dameow 通道与设备类型，device_type 默认 0=DEV_USB2CANFD
# bridge_library: drv_ws bridge 动态库路径，留空时自动搜索 drv_ws_bridge/build/libdrv_ws_bridge.so
can:
  enabled: true
  driver: "dameow"
  interface: "can0"
  selector: "0"
  tx_id: "0x123"
  extended_id: false
  bus_mode: "canfd"
  bitrate: 500000
  data_bitrate: 2000000
  bitrate_switch: true
  channel: 0
  device_type: 0
  bridge_library: ""
  reconnect_interval_ms: 5000
  send_every_n_frames: 1

# 绿光检测参数
# hsv: 绿光颜色范围
# brightness.min_v: 亮度下限，越高越偏向明亮目标
# contour.min_area/max_area: 总面积范围
# contour.far_min_area: 判定为远目标的最小面积阈值
# contour.near_min_area: 判定为近目标的最小面积阈值
# contour.min_circularity: 越高越要求接近圆
# contour.min_fill_ratio: 越高越要求轮廓填充得更实
# morphology: 掩膜去噪强度
detection:
  hsv:
    lower: [24, 31, 123]
    upper: [83, 253, 255]
  brightness:
    min_v: 180
    max_std: 90
  morphology:
    blur_kernel: 5
    open_kernel: 3
    close_kernel: 5
    erode_iterations: 0
    dilate_iterations: 1
  contour:
    min_area: 60
    max_area: 70000
    far_min_area: 60
    near_min_area: 300
    min_circularity: 0.55
    min_aspect_ratio: 0.55
    min_fill_ratio: 0.55
  circle:
    min_radius: 4
    max_radius: 500
  scoring:
    brightness_weight: 1.4
    circularity_weight: 1.2
    fill_ratio_weight: 1.0
    center_weight: 0.35
  debug:
    console_log_interval_frames: 20
    draw_rejected: false

# 录屏参数，默认关闭
recording:
  enabled: false
  format: "mkv"
  capture_method: "xcb"
  output_dir: "video"
  display: ":0.0"
  frame_rate: 10
  resolution: null
